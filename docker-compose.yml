version: "3.9"

services:
  # ── DB2 Copilot Extension Agent ──────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
    restart: unless-stopped
    depends_on:
      db2:
        condition: service_healthy

  # ── IBM DB2 Community Edition (optional — for local development) ─────────────
  # Remove or comment out this service if you are connecting to an existing DB2.
  db2:
    image: ibmcom/db2:latest
    privileged: true
    environment:
      - LICENSE=accept
      - DB2INST1_PASSWORD=password
      - DBNAME=sample
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2 connect to sample' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s

volumes:
  db2data:
