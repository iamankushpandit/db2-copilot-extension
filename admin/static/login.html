<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Copilot Admin — Sign In</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;background:#f6f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:40px;max-width:360px;width:100%;text-align:center;box-shadow:0 1px 3px rgba(27,31,36,.04)}
    h1{font-size:20px;margin:0 0 8px}
    p{color:#6e7781;font-size:14px;margin:0 0 24px;line-height:1.5}
    .btn{display:inline-block;padding:9px 20px;border:1px solid rgba(27,31,36,.15);border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;background:#24292e;color:#fff;text-decoration:none}
    .btn:hover{background:#32383f}
    .error{background:#ffebe9;color:#cf222e;border:1px solid #ff818266;border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;text-align:left}
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:40px;margin-bottom:16px">🗄️</div>
    <h1>DB Copilot Admin</h1>
    <p>Sign in with your GitHub account to access the admin panel. Only authorised users can proceed.</p>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    <a class="btn" href="/admin/login">
      <svg height="16" width="16" viewBox="0 0 16 16" style="vertical-align:middle;margin-right:6px" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Sign in with GitHub
    </a>
  </div>
</body>
</html>
